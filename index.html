<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get AIVision</title>
    
    <meta name="description" content="Download AIVision: The Ultimate AI Photo & Video Editor.">
    <meta property="og:title" content="AIVision Photo & Video Editor">
    <meta property="og:description" content="Enhance your photos and videos with AI power. Download now.">
    <meta property="og:image" content="logo.png"> 

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.6);
            --text-main: #ffffff;
            --text-sub: #a1a1a6;
            --android-green: #3DDC84; /* Yeni Android Yeşili */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            /* Arka plana mor/mavi hafif bir nebula efekti */
            background-image: radial-gradient(circle at 50% 0%, #2a1f3d 0%, #000000 70%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px); /* Buzlu cam efekti */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 45px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease-out;
        }

        /* LOGO AYARLARI */
        .app-logo-img {
            width: 100px;  /* Logo boyutu */
            height: 100px;
            border-radius: 24px; /* Köşeleri yuvarlatma (Apple stili) */
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); /* Logoya gölge */
            object-fit: cover;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 10px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-sub);
            font-size: 16px;
            line-height: 1.5;
            margin: 0 0 35px;
        }

        .store-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 15px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box; 
        }

        .store-btn svg {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* iOS Buton Stili */
        .btn-ios {
            background-color: #ffffff;
            color: #000000;
        }
        .btn-ios:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,255,255,0.25); }

        /* Android Buton Stili - YENİLENDİ */
        .btn-android {
            background-color: var(--android-green); /* Yeşil renk */
            color: #ffffff; /* Beyaz yazı */
            border: none; /* Kenarlık kaldırıldı */
        }
        .btn-android svg {
            fill: #ffffff; /* İkon rengi beyaz */
        }
        .btn-android:hover { background-color: #34c779; transform: scale(1.02); box-shadow: 0 0 20px rgba(61, 220, 132, 0.4); }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #444;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script type="text/javascript">
        function redirectStore() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // SENİN LİNKLERİN
            var iosUrl = "https://apps.apple.com/tr/app/aivision-photo-video-editor/id6757948050?l=tr";
            var androidUrl = "https://play.google.com/store/apps/details?id=com.skapps.aivision&gl=TR";

            // iOS (iPhone, iPad) Redirect
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = iosUrl;
            } 
            // Android Redirect
            else if (/android/i.test(userAgent)) {
                window.location.href = androidUrl;
            }
        }

        window.onload = redirectStore;
    </script>
</head>

    <div class="container">
