<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIVision - Hemen İndir</title>
    
    <meta property="og:title" content="AIVision Photo & Video Editor">
    <meta property="og:description" content="Yapay zeka destekli fotoğraf ve video düzenleyici uygulamasını hemen indir.">
    <meta property="og:image" content=""> 

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { margin-bottom: 10px; color: #333; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin-bottom: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .ios-btn { background-color: #007AFF; } /* Apple Mavisi */
        .android-btn { background-color: #3DDC84; color: #023020; } /* Android Yeşili */
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>

    <script type="text/javascript">
        function yonlendir() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // SENİN LİNKLERİN
            var iosUrl = "https://apps.apple.com/tr/app/aivision-photo-video-editor/id6757948050?l=tr";
            var androidUrl = "https://play.google.com/store/apps/details?id=com.skapps.aivision&gl=TR";

            // iOS (iPhone, iPad, iPod) Tespiti
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                // Kullanıcıya yönlendirildiğini hissettirmek için 1 saniye bekleme koyabilirsin veya direkt atabilirsin.
                // Direkt atıyoruz:
                window.location.href = iosUrl;
            } 
            // Android Tespiti
            else if (/android/i.test(userAgent)) {
                window.location.href = androidUrl;
            }
            // Masaüstü ise hiçbir şey yapma, HTML sayfasını göster.
        }

        // Sayfa yüklenir yüklenmez çalıştır
        window.onload = yonlendir;
    </script>
</head>
<body>

    <div class="container">
        <h1>AIVision</h1>
        <p>Yönlendiriliyorsunuz...<br>Eğer açılmazsa aşağıdan seçebilirsiniz:</p>

        <a href="https://apps.apple.com/tr/app/aivision-photo-video-editor/id6757948050?l=tr" class="btn ios-btn">
             App Store'dan İndir
        </a>

        <a href="https://play.google.com/store/apps/details?id=com.skapps.aivision&gl=TR" class="btn android-btn">
            🤖 Google Play'den İndir
        </a>
    </div>

    <div class="footer">
        AIVision Photo & Video Editor
    </div>

</body>
</html>
